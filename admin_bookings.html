<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baira Panditha Naati Vaidyalaya</title>
    <link rel="stylesheet" href="./main.css">
    <script src="js/translation.js" defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');

        :root {
            --sidebar-width: 300px;
            --primary-glow: rgba(46, 125, 50, 0.15);
            --secondary-glow: rgba(76, 175, 80, 0.12);
            --accent-glow: rgba(129, 199, 132, 0.1);
            --glass-bg: rgba(255, 255, 255, 0.95);
            --sidebar-bg: linear-gradient(180deg, #4CAF50 0%, #2E7D32 100%);
            --card-spacing: 32px;
            --text-primary: #1b5e20;
            --text-secondary: #558b2f;
            --text-muted: #757575;
            --bg-white: #ffffff;
            --bg-light: #f1f8f4;
            --border-light: #e0f2e9;
            --green-accent: #4CAF50;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f8fdf9 0%, #ffffff 50%, #f8fdf9 100%);
            color: #2e7d32;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(circle at 20% 30%, var(--primary-glow), transparent 50%),
                radial-gradient(circle at 80% 70%, var(--secondary-glow), transparent 50%),
                radial-gradient(circle at 50% 50%, var(--accent-glow), transparent 60%);
            opacity: 0.3;
            animation: bgPulse 15s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes bgPulse {

            0%,
            100% {
                opacity: 0.4;
            }

            50% {
                opacity: 0.7;
            }
        }

        /* 3D Container */
        .dashboard-container {
            display: grid;
            grid-template-columns: var(--sidebar-width) 1fr;
            height: 100vh;
            perspective: 2500px;
            position: relative;
            z-index: 1;
        }

        /* Enhanced 3D Sidebar */
        .sidebar {
            background: var(--sidebar-bg);
            border-right: 1px solid rgba(46, 125, 50, 0.2);
            color: rgba(255, 255, 255, 0.9);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow:
                4px 0 20px rgba(46, 125, 50, 0.15),
                inset -1px 0 0 rgba(255, 255, 255, 0.1);
            z-index: 100;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 2px;
            height: 100%;
            background: linear-gradient(to bottom,
                    transparent,
                    rgba(129, 199, 132, 0.6) 30%,
                    rgba(102, 187, 106, 0.6) 70%,
                    transparent);
            animation: glowPulse 3s ease-in-out infinite;
        }

        @keyframes glowPulse {

            0%,
            100% {
                opacity: 0.3;
            }

            50% {
                opacity: 1;
            }
        }

        /* Logo Section */
        .sidebar .flex.items-center.gap-3 {
            transform: translateZ(30px);
            transition: transform 0.3s ease;
        }

        .sidebar .flex.items-center.gap-3:hover {
            transform: translateZ(50px) scale(1.05);
        }

        /* Enhanced Navigation Items */
        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 18px 24px;
            border-radius: 16px;
            margin: 6px 16px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            font-weight: 500;
            font-size: 0.95rem;
            transform-style: preserve-3d;
            overflow: hidden;
        }

        .nav-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.15), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
            border-radius: 16px;
        }

        .nav-item:hover::before {
            opacity: 1;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #ffffff;
            transform: translateX(12px) translateZ(30px) scale(1.02);
            box-shadow:
                -4px 0 20px rgba(129, 199, 132, 0.4),
                0 8px 24px rgba(46, 125, 50, 0.3);
        }

        .nav-item.active {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.25), rgba(255, 255, 255, 0.1));
            color: #ffffff;
            box-shadow: inset 5px 0 0 #a5d6a7;
            font-weight: 600;
            transform: translateX(8px) translateZ(20px);
        }

        .nav-item.active::after {
            content: '';
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 8px;
            height: 8px;
            background: #a5d6a7;
            border-radius: 50%;
            box-shadow: 0 0 12px #a5d6a7;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: translateY(-50%) scale(1);
            }

            50% {
                opacity: 0.6;
                transform: translateY(-50%) scale(1.3);
            }
        }

        .nav-item svg {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 0 0 transparent);
        }

        .nav-item:hover svg {
            transform: scale(1.25) rotate(-8deg);
            filter: drop-shadow(0 0 8px rgba(165, 214, 167, 0.8));
        }

        .nav-item.active svg {
            transform: scale(1.15);
            filter: drop-shadow(0 0 6px rgba(165, 214, 167, 0.9));
        }

        /* Badge Counter */
        .nav-badge {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, #81c784, #66bb6a);
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(129, 199, 132, 0.5);
            min-width: 24px;
            text-align: center;
        }

        /* Main Content Styling */
        .main-content {
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
            scroll-behavior: smooth;
            padding: 0;
        }

        /* Section Dividers */
        .section-divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(76, 175, 80, 0.3), transparent);
            margin: var(--card-spacing) 0;
            position: relative;
        }

        .section-divider::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 8px;
            background: #4CAF50;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.6);
        }

        /* Enhanced Glass Cards */
        .glass-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(76, 175, 80, 0.15);
            border-radius: 28px;
            padding: 28px;
            box-shadow:
                0 4px 20px rgba(46, 125, 50, 0.08),
                inset 0 1px 0 rgba(255, 255, 255, 0.9);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(76, 175, 80, 0.2), transparent);
        }

        .glass-card:hover {
            transform: translateY(-10px) scale(1.015);
            border-color: rgba(76, 175, 80, 0.3);
            box-shadow:
                0 8px 30px rgba(46, 125, 50, 0.15),
                0 0 30px rgba(76, 175, 80, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 1);
        }

        /* Stats Section */
        .stat-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 700;
            background: rgba(76, 175, 80, 0.1);
            color: #2e7d32;
            margin-bottom: 12px;
            border: 1px solid rgba(76, 175, 80, 0.2);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-value {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1b5e20 0%, #4CAF50 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            line-height: 1;
            text-shadow: 0 0 30px rgba(76, 175, 80, 0.2);
        }

        /* Enhanced Tables */
        .table-view {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 14px;
        }

        .table-view th {
            padding: 14px 28px;
            text-align: left;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #2e7d32;
            font-weight: 700;
            background: rgba(76, 175, 80, 0.08);
            border-bottom: 2px solid rgba(76, 175, 80, 0.2);
        }

        .table-view td {
            padding: 22px 28px;
            background: rgba(255, 255, 255, 0.7);
            border-top: 1px solid rgba(76, 175, 80, 0.1);
            border-bottom: 1px solid rgba(76, 175, 80, 0.1);
            backdrop-filter: blur(10px);
            color: #37474f;
        }

        .table-view tr td:first-child {
            border-left: 1px solid rgba(76, 175, 80, 0.1);
            border-radius: 24px 0 0 24px;
        }

        .table-view tr td:last-child {
            border-right: 1px solid rgba(76, 175, 80, 0.1);
            border-radius: 0 24px 24px 0;
        }

        .table-view tbody tr {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .table-view tbody tr:hover td {
            background: rgba(76, 175, 80, 0.15);
            transform: scale(1.008) translateX(4px);
            border-color: rgba(76, 175, 80, 0.3);
            box-shadow: 0 4px 16px rgba(46, 125, 50, 0.15);
        }

        /* Status Tags */
        .status-tag {
            padding: 7px 14px;
            border-radius: 10px;
            font-size: 0.68rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            display: inline-block;
        }

        .status-tag.pending {
            background: rgba(245, 158, 11, 0.15);
            color: #fbbf24;
            border: 1.5px solid rgba(245, 158, 11, 0.3);
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.2);
        }

        .status-tag.confirmed {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
            border: 1.5px solid rgba(16, 185, 129, 0.3);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
        }

        .status-tag.completed {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border: 1.5px solid rgba(16, 185, 129, 0.3);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
        }

        .status-tag:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(76, 175, 80, 0.3);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(241, 248, 244, 0.8);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #4CAF50, #2e7d32);
            border-radius: 10px;
            border: 2px solid rgba(241, 248, 244, 0.8);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #66bb6a, #43a047);
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-40px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .animate-up {
            animation: fadeIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        /* Responsive Design */
        @media (max-width: 1280px) {
            :root {
                --sidebar-width: 260px;
            }
        }

        @media (max-width: 1024px) {
            .dashboard-container {
                grid-template-columns: 90px 1fr;
            }

            :root {
                --sidebar-width: 90px;
            }

            .sidebar span:not(.nav-badge),
            .sidebar h1,
            .sidebar p {
                display: none;
            }

            .nav-item {
                justify-content: center;
                padding: 18px;
            }

            .nav-badge {
                right: 8px;
                font-size: 0.6rem;
                padding: 2px 6px;
            }

            .nav-item.active::after {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .glass-card {
                padding: 20px;
                border-radius: 20px;
            }

            .stat-value {
                font-size: 2.2rem;
            }

            .table-view th,
            .table-view td {
                padding: 16px 20px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>

    <script src="js/app_logic.js"></script>
    <script>
        // --- SEARCH & FILTER LOGIC ---
        function filterBookings() {
            const nameQuery = document.getElementById('paramsSearchName').value.toLowerCase();
            const dateQuery = document.getElementById('paramsSearchDate').value;

            const rows = document.querySelectorAll('#bookingTableBody tr');
            let hasVisible = false;

            rows.forEach(row => {
                const nameCell = row.cells[0].innerText.toLowerCase();
                const dateCell = row.cells[2].innerText;

                const matchesName = nameCell.includes(nameQuery);
                const matchesDate = !dateQuery || dateCell.includes(dateQuery);

                if (matchesName && matchesDate) {
                    row.style.display = '';
                    hasVisible = true;
                } else {
                    row.style.display = 'none';
                }
            });

            const noMsg = document.getElementById('noBookingsMsg');
            if (!hasVisible) {
                noMsg.classList.remove('hidden');
            } else {
                noMsg.classList.add('hidden');
            }
        }

        async function deleteBooking(id) {
            if (!confirm('Are you sure you want to delete this booking?')) return;
            try {
                const res = await fetch('api/admin_data.php?action=delete_booking', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: id })
                });
                const data = await res.json();
                if (data.success) {
                    loadData();
                } else {
                    alert('Delete failed: ' + data.message);
                }
            } catch (e) {
                console.error("Delete Error", e);
                alert('An error occurred while deleting.');
            }
        }

        async function toggleBookingStatus(id, currentStatus) {
            const newStatus = currentStatus === 'pending' ? 'completed' : 'pending';
            try {
                const res = await fetch('api/update_booking_status.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: id, status: newStatus })
                });
                const data = await res.json();
                if (data.success) {
                    loadData();
                } else {
                    alert('Status update failed: ' + (data.message || 'Unknown error'));
                }
            } catch (e) {
                console.error("Status Update Error", e);
                alert('An error occurred while updating status.');
            }
        }

        async function loadData() {
            try {
                const res = await fetch('api/admin_data.php?action=stats');
                const data = await res.json();

                // Booking Table
                const bookingBody = document.getElementById('bookingTableBody');
                bookingBody.innerHTML = (data.recentBookings || []).map(b => `
                    <tr>
                        <td>
                            <div class="text-sm font-bold" style="color: #1b5e20;">${b.first_name} ${b.last_name}</div>
                            <div class="text-xs font-medium" style="color: #757575;">Record #${b.id}</div>
                        </td>
                        <td class="text-xs font-bold uppercase tracking-tighter" style="color: #558b2f;">
                            ${b.inquiry_details || b.inquiry_type}
                        </td>
                        <td>
                            <div class="text-sm font-medium" style="color: #2e7d32;">${b.preferred_date}</div>
                            <div class="text-xs" style="color: #757575;">${b.preferred_time}</div>
                        </td>
                        <td class="max-w-[150px]">
                            <div class="text-xs text-gray-700 truncate" title="${b.health_concerns ? b.health_concerns.replace(/"/g, '&quot;') : ''}">${b.health_concerns || '-'}</div>
                        </td>
                        <td>
                            <div class="text-xs font-bold ${b.experienced_ayurveda === 'yes' ? 'text-green-600' : 'text-gray-500'}">${b.experienced_ayurveda ? b.experienced_ayurveda.toUpperCase() : '-'}</div>
                        </td>
                        <td class="max-w-[150px]">
                            <div class="text-xs text-gray-700 truncate" title="${b.previous_consultation_details ? b.previous_consultation_details.replace(/"/g, '&quot;') : ''}">${b.previous_consultation_details || '-'}</div>
                        </td>
                        <td>
                            <span class="status-tag ${b.status || 'pending'}" 
                                  onclick="toggleBookingStatus(${b.id}, '${b.status || 'pending'}')" 
                                  style="cursor: pointer; transition: all 0.3s ease;"
                                  title="Click to toggle status">
                                ${(b.status || 'pending').toUpperCase()}
                            </span>
                        </td>
                        <td class="text-sm font-mono" style="color: #558b2f;">${b.phone}</td>
                        <td class="text-right">
                            <button onclick="deleteBooking(${b.id})" class="p-2 hover:bg-red-500/10 rounded-lg text-gray-500 hover:text-red-500 transition-all group" title="Remove Record">
                                <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="group-hover:scale-110 transition-transform">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                </svg>
                            </button>
                        </td>
                    </tr>
                `).join('');

                // Re-apply filters if active
                filterBookings();

                // Show Content
                document.getElementById('loading').style.display = 'none';
                document.getElementById('dashboardContent').style.display = 'block';
                document.getElementById('dashboardContent').classList.add('animate-fade-in');

            } catch (e) {
                console.error("Dashboard Load Error", e);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('paramsSearchName').addEventListener('input', filterBookings);
            document.getElementById('paramsSearchDate').addEventListener('change', filterBookings);
        });


        document.addEventListener('DOMContentLoaded', () => {
            // Check session first
            fetch('api/auth.php?action=check_session')
                .then(r => r.json())
                .then(session => {
                    if (!session.loggedIn || session.role !== 'admin') {
                        window.location.href = 'login.html';
                    } else {
                        loadData();
                        // Auto-refresh every 5 seconds
                        setInterval(loadData, 5000);
                    }
                });

            document.getElementById('logoutBtn').addEventListener('click', async () => {
                await fetch('api/auth.php?action=logout');
                window.location.href = 'login.html';
            });


        });
    </script>
</body>

</html>
